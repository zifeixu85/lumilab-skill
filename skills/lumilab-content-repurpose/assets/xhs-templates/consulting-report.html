<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>咨询报告封面</title>
<!-- Lumi Lab · 小红书封面 · consulting-report（咨询报告，严肃数据/权威调性）
     改编自 lieflat-xhs-cover/consulting-report 思路（MIT, github.com/larashero3-dotcom/lieflat-html-design），OKLCH 重做。
     占位：{{KICKER}} {{TITLE}} {{FINDING}} {{S1_LABEL}} {{S1_VALUE}} {{S2_LABEL}} {{S2_VALUE}} {{S3_LABEL}} {{S3_VALUE}} {{META}}
     安全边界：标题 data-fit；finding line-clamp；居中 stage。配色可被 design_direction.json 覆盖。 -->
<style>
:root{--paper:oklch(98% 0.004 250);--paper-2:oklch(95% 0.01 250);--ink:oklch(17% 0.02 250);--ink-2:oklch(32% 0.02 250);
--muted:oklch(48% 0.015 250);--line:oklch(17% 0.02 250/.16);--line-2:oklch(17% 0.02 250/.3);--accent:oklch(48% 0.13 255);
--accent-soft:color-mix(in oklch,var(--accent) 12%,transparent);--sans:"PingFang SC","Noto Sans SC",-apple-system,system-ui,sans-serif;--mono:"SFMono-Regular",Menlo,Consolas,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;align-items:center;justify-content:center;background:#1a1a1a;padding:24px}
.card{position:relative;width:600px;height:800px;overflow:hidden;background:var(--paper);color:var(--ink);
padding:96px 80px 100px;display:flex;flex-direction:column;font-family:var(--sans)}
.top{flex:none;display:flex;justify-content:space-between;align-items:center;gap:16px;
border-bottom:2px solid var(--ink);padding-bottom:14px}
.kicker{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);
overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.no{font-family:var(--mono);font-size:12px;color:var(--muted);flex:none}
.stage{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:24px}
.title{font-weight:600;line-height:1.16;overflow:hidden;overflow-wrap:anywhere}
.finding{background:var(--accent-soft);border-left:4px solid var(--accent);padding:16px 18px;border-radius:0 10px 10px 0;
font-size:18px;font-weight:600;line-height:1.5;color:var(--ink);
display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.stats{display:flex;gap:0;border-top:1px solid var(--line)}
.stat{flex:1;padding:16px 8px 0;border-right:1px solid var(--line)}
.stat:last-child{border-right:0}
.stat__v{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--accent);line-height:1;font-variant-numeric:tabular-nums;
white-space:nowrap;overflow:hidden}
.stat__l{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.4}
.foot{flex:none;border-top:1px solid var(--line-2);padding-top:14px;font-family:var(--mono);font-size:12px;
letter-spacing:.06em;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style></head>
<body>
<article class="card">
  <div class="top"><span class="kicker">{{KICKER}}</span><span class="no">REPORT Nº 01</span></div>
  <div class="stage">
    <h1 class="title" data-fit data-fit-max="50" data-fit-min="28" data-fit-maxh="170">{{TITLE}}</h1>
    <div class="finding">{{FINDING}}</div>
    <div class="stats">
      <div class="stat"><div class="stat__v">{{S1_VALUE}}</div><div class="stat__l">{{S1_LABEL}}</div></div>
      <div class="stat"><div class="stat__v">{{S2_VALUE}}</div><div class="stat__l">{{S2_LABEL}}</div></div>
      <div class="stat"><div class="stat__v">{{S3_VALUE}}</div><div class="stat__l">{{S3_LABEL}}</div></div>
    </div>
  </div>
  <div class="foot">{{META}}</div>
</article>
<script>(function(){function ok(e,h){return e.scrollWidth<=e.clientWidth+.5&&(!h||e.scrollHeight<=h+.5)}
function fit(e){var mn=+(e.dataset.fitMin||16),mx=+(e.dataset.fitMax||parseFloat(getComputedStyle(e).fontSize)),h=e.dataset.fitMaxh?+e.dataset.fitMaxh:0,lo=mn,hi=mx,b=mn;for(var i=0;i<26;i++){var m=(lo+hi)/2;e.style.fontSize=m+'px';if(ok(e,h)){b=m;lo=m}else hi=m}e.style.fontSize=b+'px'}
document.querySelectorAll('[data-fit]').forEach(fit);document.documentElement.setAttribute('data-fitted','1')})();</script>
</body></html>
